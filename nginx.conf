# NexTerm Nginx Reverse Proxy Configuration
# Place this file in /etc/nginx/sites-available/nexterm and symlink to /etc/nginx/sites-enabled/
#
# IMPORTANT: Replace 100.X.X.X with your actual Tailscale IP (run `tailscale ip -4` on the VPS)
# Do NOT bind to 0.0.0.0 or your public IP (178.104.34.252) to ensure the service remains private.

server {
    # Bind only to the Tailscale interface for HTTP
    listen 100.X.X.X:80;
    server_name nexterm.internal;

    # Optional: Redirect HTTP to HTTPS
    # return 301 https://$host$request_uri;

    # If not using HTTPS, uncomment the location block below:
    
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy WebSocket connections for terminal
    location /ws/terminal {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400; # Prevent websocket from dropping connection
    }

    # Proxy API endpoints
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

