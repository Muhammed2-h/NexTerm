services:
  nexterm:
    build: .
    image: nexterm:latest
    container_name: nexterm
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - NEXTERM_SHELL=/bin/bash      # bash runs inside the Alpine container
    ports:
      - '3000:3000'
    networks:
      - nexterm_net

networks:
  nexterm_net:
    driver: bridge
    name: nexterm_net
